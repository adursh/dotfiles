# ============================================
# ESSENTIAL SETTINGS
# ============================================

# fix vim escape delay
set -sg escape-time 0

# enable focus events for vim autoread
set -g focus-events on

# increase scrollback buffer
set -g history-limit 50000

# mouse support
set -g mouse on

# start index at 1
set -g base-index 1
set -g pane-base-index 1

# Improve colors
set -g default-terminal "${TERM}"
set -as terminal-features ",xterm-256color:RGB"

# disable auto-rename
set -g automatic-rename off
set -g allow-rename off

# Renumber windows when one is removed.
set -g renumber-windows on

# Enable undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'


# ============================================
# KEY BINDINGS
# ============================================

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# pane splitting (keep current path)
bind ? split-window -h -c "#{pane_current_path}"
bind / split-window -v -c "#{pane_current_path}"

# # vim-style pane navigation
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# vim-style pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Move the current window to the next window or previous window position
bind -r N run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) + 1)"
bind -r P run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) - 1)"

# switch between two most recently used sessions
bind space switch-client -l

# show status left
set -g status-left-length 100
set -g status-right-length 100

# Move tmux status bar to top
bind-key C-k "set-option -g status-position top;"
# Move tmux status bar to bottom
bind-key C-j "set-option -g status-position bottom;"

# kill current pane immediately (no prompt)
bind-key x kill-pane

# kill current session
bind-key q kill-session

# rename session
bind-key "<" command-prompt -I "#S" "rename-session '%%'"

# ============================================
# APPEARANCE
# ============================================

# Status bar
set -g status on

# refresh every 5secs
set -g status-interval 1

set-option -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=#313244,fg=black,bright,nobold"

set -g status-left "#[fg=#b4befe,bg=default,bold] #(printf '\uEBC8') #S  "
set -g status-right "\
#{?#{==:#{client_key_table},prefix},#[fg=#6e6a86] prefix  ,}\
#{?pane_in_mode,#[fg=#6e6a86] copy  ,}\
#{?#{==:#{client_key_table},locked},#[fg=#6e6a86] locked  ,}\
#{?pane_synchronized,#[fg=#6e6a86] sync  ,}\
#[fg=#7287b0 bg=default] #{b:pane_current_path} "

set-option -g window-status-format "#I " 
set-option -g window-status-current-format "#I "
set-option -g window-status-current-style "fg=#cdd6f4,nobold"
# set-option -g window-status-last-style "fg=#a6adc8,nobold"
set-option -g window-status-last-style "fg=#4f4f4f,nobold"
# set-option -g window-status-activity-style "fg=#fab387,nobold"

# message line
set -g message-style "bg=default ,fg=#f38ba8,bold"
# set -g message-style "fg=#cdd6f4,bg=default"
set -g message-command-style "fg=#cdd6f4,bg=default"

# borders
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta



# ============================================
# COPY MODE
# ============================================
setw -g mode-keys vi


# sesh with zoxide
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# ============================================================
# SESSIONS
# ============================================================

bind h run-shell "sesh connect ~"
bind "." run-shell "sesh connect ~/.df"
bind f run-shell "sesh connect ~/.config"
bind j run-shell "sesh connect ~/Documents/Projects"
bind i run-shell "sesh connect ~/private"
bind w run-shell "sesh connect ~/Downloads"


# ============================================
# PLUGINS
# ============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'wfxr/tmux-fzf-url'

# saves the visible text content of each pane when resurrect does a save but can be laggy
# set -g @resurrect-capture-pane-contents 'on'

# save tmux state every 15mins
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
