# ============================================
# ESSENTIAL SETTINGS
# ============================================

# fix vim escape delay
set -sg escape-time 0

# enable focus events for vim autoread
set -g focus-events on

# increase scrollback buffer
set -g history-limit 50000

# mouse support
set -g mouse on

# start index at 1
set -g base-index 1
set -g pane-base-index 1

# Improve colors
set -g default-terminal "${TERM}"
# set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# disable auto-rename
set -g automatic-rename off
set -g allow-rename off

# don't detach tmux when killing a session
set -g detach-on-destroy off

# Renumber windows when one is removed.
set -g renumber-windows on

# Enable undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# A bell in another window should cause a bell in the current window
set -g bell-action any

# Don't show distracting notifications
set -g visual-bell off
set -g visual-activity off


# ============================================
# KEY BINDINGS
# ============================================

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# pane splitting (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# # Smart pane switching with awareness of vim splits
# is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
# bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
# bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
# bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
# bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Switch between previous and next windows with repeatable
bind -r n next-window
bind -r p previous-window

# Move the current window to the next window or previous window position
bind -r N run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) + 1)"
bind -r P run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) - 1)"

# Switch between two most recently used windows
bind Space last-window

# switch between two most recently used sessions
bind b switch-client -l

# break pane out of window
bind-key B break-pane -d

# put pane back into window
bind-key E command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# open lazygit in a new window with prefix+g
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# toggle status bar
bind-key -T prefix t set-option -g status

# search sessions
bind C-e display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-session |\
    xargs tmux switch-client -t"

# search windows in current session
bind C-f display-popup -E "\
    tmux list-windows -F '#{window_index} #{window_name}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-window |\
    cut -d ' ' -f 1 |\
    xargs tmux select-window -t"

# Move tmux status bar to top
bind-key C-k "set-option -g status-position top;"
# Move tmux status bar to bottom
bind-key C-j "set-option -g status-position bottom;"

# new session with name prompt
bind C command-prompt -p "new session name: " "new-session -s '%%'"

# new window with name prompt
bind c command-prompt -p "new window name: " "new-window -n '%%' -c '#{pane_current_path}'"

# kill current pane immediately (no prompt)
bind-key x kill-pane

# kill current session immediately (no prompt)  
bind-key X kill-window


# ============================================
# APPEARANCE
# ============================================

# Status bar
set -g status on

# refresh every 5secs
set -g status-interval 1

set-option -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=#3a3f58,fg=#a6adc8"

set -g status-left "[#S]  "
# set -g status-right "#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) "
set -g status-right "#{b:pane_current_path} #(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null) "
set-option -g window-status-format "#{window_index}:#{window_name}#{window_flags} " 
set-option -g window-status-current-format "#{window_index}:#{window_name}#{window_flags} "
set-option -g window-status-current-style "fg=#cdd6f4,bold"
# set-option -g window-status-last-style "fg=#a6adc8"
set-option -g window-status-activity-style "fg=#fab387"

# # Pane border separator line
# set -g pane-border-status top
# set -g pane-border-format ""
# set -g pane-border-style "fg=#313244"
# set -g pane-active-border-style "fg=#313244"

# message line
set -g message-style "bg=#313244,fg=#f38ba8"


# ============================================
# COPY MODE
# ============================================

setw -g mode-keys vi

# bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"


# ============================================
# PLUGINS
# ============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'
# set -g @plugin 'dracula/tmux'
#
# set -g @dracula-show-powerline true
# set -g @dracula-show-flags true
# set -g @dracula-show-left-icon session
# set -g status-position top

# saves the visible text content of each pane when resurrect does a save but can be laggy
# set -g @resurrect-capture-pane-contents 'on'

# save tmux state every 15mins
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
